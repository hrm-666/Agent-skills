<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen overflow-hidden bg-neutral-50 text-neutral-950">
  <div class="flex h-full flex-col">
    <header class="flex h-14 shrink-0 items-center justify-between border-b border-neutral-200 bg-white px-4">
      <h1 class="text-base font-semibold">Mini Agent</h1>
      <select id="provider" class="h-9 rounded-md border border-neutral-300 bg-white px-3 text-sm outline-none focus:border-indigo-500"></select>
    </header>

    <main id="events" class="flex-1 overflow-y-auto px-4 py-5">
      <div class="mx-auto flex max-w-4xl flex-col gap-4"></div>
    </main>

    <footer class="shrink-0 border-t border-neutral-200 bg-white px-4 py-3">
      <div id="dropzone" class="mx-auto max-w-4xl rounded-lg border border-neutral-200 bg-white p-3">
        <div id="attachments" class="mb-2 hidden flex-wrap gap-2"></div>
        <div class="flex items-end gap-2">
          <button id="pickFile" type="button" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-md border border-neutral-300 text-lg hover:bg-neutral-50" title="添加文件">
            +
          </button>
          <textarea id="text" rows="1" class="max-h-36 min-h-10 flex-1 resize-none rounded-md border border-neutral-300 px-3 py-2 text-sm outline-none focus:border-indigo-500" placeholder="输入内容..."></textarea>
          <button id="send" type="button" class="h-10 shrink-0 rounded-md bg-indigo-600 px-4 text-sm font-medium text-white hover:bg-indigo-700 disabled:cursor-not-allowed disabled:bg-neutral-300">
            发送
          </button>
        </div>
        <input id="file" type="file" multiple class="hidden">
      </div>
    </footer>
  </div>

  <script>
    const eventsWrap = document.querySelector('#events > div');
    const eventsScroller = document.getElementById('events');
    const provider = document.getElementById('provider');
    const text = document.getElementById('text');
    const fileInput = document.getElementById('file');
    const pickFile = document.getElementById('pickFile');
    const send = document.getElementById('send');
    const dropzone = document.getElementById('dropzone');
    const attachments = document.getElementById('attachments');
    const uploadPaths = [];

    function scrollToBottom() {
      eventsScroller.scrollTop = eventsScroller.scrollHeight;
    }

    function autoSizeTextarea() {
      text.style.height = 'auto';
      text.style.height = Math.min(text.scrollHeight, 144) + 'px';
    }

    function appendBubble(role, content, paths = []) {
      const row = document.createElement('div');
      row.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';

      const bubble = document.createElement('div');
      bubble.className = role === 'user'
        ? 'max-w-[78%] rounded-lg bg-indigo-600 px-4 py-3 text-sm leading-6 text-white'
        : 'max-w-[78%] rounded-lg border border-neutral-200 bg-white px-4 py-3 text-sm leading-6 text-neutral-900';

      const body = document.createElement('div');
      body.className = 'whitespace-pre-wrap';
      body.textContent = content;
      bubble.appendChild(body);

      if (paths.length) {
        const files = document.createElement('div');
        files.className = 'mt-2 flex flex-wrap gap-2';
        paths.forEach(path => {
          const item = document.createElement('a');
          item.href = path;
          item.target = '_blank';
          item.className = role === 'user'
            ? 'rounded border border-indigo-300 px-2 py-1 text-xs text-white/90'
            : 'rounded border border-neutral-300 px-2 py-1 text-xs text-neutral-600';
          item.textContent = path.split('/').pop();
          files.appendChild(item);
        });
        bubble.appendChild(files);
      }

      row.appendChild(bubble);
      eventsWrap.appendChild(row);
      scrollToBottom();
      return row;
    }

    function appendToolStep(step) {
      const row = document.createElement('div');
      row.className = 'flex justify-start';

      const box = document.createElement('details');
      box.className = 'max-w-[78%] rounded-md border border-neutral-200 bg-neutral-100 px-3 py-2 text-xs text-neutral-700';

      const summary = document.createElement('summary');
      summary.className = 'cursor-pointer select-none font-medium';
      summary.textContent = `tool: ${step.name}`;

      const pre = document.createElement('pre');
      pre.className = 'mt-2 max-h-64 overflow-auto whitespace-pre-wrap rounded bg-white p-2 text-[11px] leading-5';
      pre.textContent = JSON.stringify({ args: step.args, result: step.result }, null, 2);

      box.appendChild(summary);
      box.appendChild(pre);
      row.appendChild(box);
      eventsWrap.appendChild(row);
      scrollToBottom();
    }

    function appendError(message) {
      const row = document.createElement('div');
      row.className = 'flex justify-start';
      const box = document.createElement('div');
      box.className = 'max-w-[78%] rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700';
      box.textContent = message;
      row.appendChild(box);
      eventsWrap.appendChild(row);
      scrollToBottom();
    }

    function renderAttachments() {
      attachments.innerHTML = '';
      attachments.classList.toggle('hidden', uploadPaths.length === 0);
      uploadPaths.forEach(path => {
        const chip = document.createElement('span');
        chip.className = 'rounded-md border border-neutral-300 bg-neutral-50 px-2 py-1 text-xs text-neutral-700';
        chip.textContent = path.split('/').pop();
        attachments.appendChild(chip);
      });
    }

    async function uploadFiles(files) {
      for (const file of files) {
        const form = new FormData();
        form.append('file', file);
        const response = await fetch('/api/upload', { method: 'POST', body: form });
        if (!response.ok) throw new Error(`上传失败: ${file.name}`);
        const result = await response.json();
        uploadPaths.push(result.path);
      }
      renderAttachments();
    }

    async function loadProviders() {
      const saved = localStorage.getItem('mini-agent-provider');
      const items = await fetch('/api/providers').then(r => r.json());
      provider.innerHTML = '';
      items.forEach(item => {
        const option = document.createElement('option');
        option.value = item.name;
        option.textContent = `${item.name}${item.configured ? '' : ' (未配置)'}`;
        option.disabled = !item.configured;
        provider.appendChild(option);
      });

      const enabled = items.filter(item => item.configured).map(item => item.name);
      if (saved && enabled.includes(saved)) {
        provider.value = saved;
      } else if (enabled.length) {
        provider.value = enabled[0];
      }
    }

    async function sendMessage() {
      const content = text.value.trim();
      if (!content && uploadPaths.length === 0) return;

      const paths = [...uploadPaths];
      appendBubble('user', content || '[文件]', paths);

      text.value = '';
      uploadPaths.length = 0;
      fileInput.value = '';
      renderAttachments();
      autoSizeTextarea();

      send.disabled = true;
      const thinking = appendBubble('agent', '处理中...');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: content, image_paths: paths, provider: provider.value })
        });

        const result = await response.json();
        thinking.remove();

        if (!response.ok) {
          appendError(result.detail || '请求失败');
          return;
        }

        (result.steps || []).forEach(appendToolStep);
        appendBubble('agent', result.reply || '');
      } catch (error) {
        thinking.remove();
        appendError(error.message || String(error));
      } finally {
        send.disabled = false;
        text.focus();
      }
    }

    provider.addEventListener('change', () => {
      localStorage.setItem('mini-agent-provider', provider.value);
    });

    pickFile.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => uploadFiles(fileInput.files).catch(error => appendError(error.message)));

    text.addEventListener('input', autoSizeTextarea);
    text.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    send.addEventListener('click', sendMessage);

    dropzone.addEventListener('dragover', event => {
      event.preventDefault();
      dropzone.classList.add('border-indigo-400');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('border-indigo-400');
    });

    dropzone.addEventListener('drop', event => {
      event.preventDefault();
      dropzone.classList.remove('border-indigo-400');
      uploadFiles(event.dataTransfer.files).catch(error => appendError(error.message));
    });

    loadProviders().catch(error => appendError(error.message));
    autoSizeTextarea();
  </script>
</body>
</html>
