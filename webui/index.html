<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50 text-neutral-900">
  <div class="mx-auto max-w-5xl p-6">
    <div class="mb-4 flex items-center justify-between border-b border-neutral-200 pb-4">
      <h1 class="text-xl font-semibold">Mini Agent</h1>
      <select id="provider" class="rounded border border-neutral-300 px-3 py-2"></select>
    </div>
    <div id="events" class="mb-4 min-h-[420px] rounded border border-neutral-200 bg-white p-4"></div>
    <div class="rounded border border-neutral-200 bg-white p-4">
      <input id="file" type="file" multiple class="mb-3 block">
      <textarea id="text" class="mb-3 w-full rounded border border-neutral-300 p-3" rows="4" placeholder="输入内容..."></textarea>
      <button id="send" class="rounded bg-indigo-600 px-4 py-2 text-white">发送</button>
    </div>
  </div>
  <script>
    const events = document.getElementById('events');
    const provider = document.getElementById('provider');
    const text = document.getElementById('text');
    const fileInput = document.getElementById('file');
    const uploadPaths = [];

    function appendLine(content) {
      const div = document.createElement('div');
      div.className = 'mb-2 whitespace-pre-wrap text-sm';
      div.textContent = content;
      events.appendChild(div);
    }

    async function loadProviders() {
      const items = await fetch('/api/providers').then(r => r.json());
      items.forEach(item => {
        const option = document.createElement('option');
        option.value = item.name;
        option.textContent = item.name;
        provider.appendChild(option);
      });
    }

    fileInput.addEventListener('change', async () => {
      for (const file of fileInput.files) {
        const form = new FormData();
        form.append('file', file);
        const result = await fetch('/api/upload', { method: 'POST', body: form }).then(r => r.json());
        uploadPaths.push(result.path);
      }
    });

    document.getElementById('send').addEventListener('click', async () => {
      appendLine(`User: ${text.value}`);
      const result = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text.value, image_paths: uploadPaths, provider: provider.value })
      }).then(r => r.json());
      (result.steps || []).forEach(step => appendLine(`🔧 ${step.name}`));
      appendLine(`Agent: ${result.reply}`);
      text.value = '';
      uploadPaths.length = 0;
      fileInput.value = '';
    });

    loadProviders();
  </script>
</body>
</html>
