<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 3px; }
  </style>
</head>
<body class="bg-white text-gray-900 flex flex-col h-screen">
  <!-- Top Bar -->
  <header class="flex items-center justify-between px-4 py-3 border-b border-gray-200 bg-white">
    <h1 class="text-lg font-semibold text-gray-700">Mini Agent</h1>
    <div class="flex items-center gap-2">
      <span class="text-sm text-gray-500">Model:</span>
      <select id="modelSelect" class="text-sm border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </select>
    </div>
  </header>

  <!-- Chat Area -->
  <main id="chatArea" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 scrollbar-thin">
    <div class="text-center text-gray-400 text-sm py-8">开始对话吧</div>
  </main>

  <!-- Input Area -->
  <footer class="border-t border-gray-200 px-4 py-3 bg-white">
    <div class="flex items-end gap-2">
      <button id="uploadBtn" class="text-gray-400 hover:text-gray-600 p-2 flex-shrink-0" title="上传文件">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
        </svg>
      </button>
      <input type="file" id="fileInput" class="hidden" multiple>
      <textarea id="messageInput" rows="1" placeholder="输入内容..."
        class="flex-1 resize-none border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
      <button id="sendBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 disabled:opacity-50 flex-shrink-0">发送</button>
    </div>
  </footer>

  <script>
    const API_BASE = '';
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');

    let uploadedFiles = [];
    let isLoading = false;

    async function loadProviders() {
      try {
        const res = await fetch(`${API_BASE}/api/providers`);
        const providers = await res.json();
        modelSelect.innerHTML = '';
        providers.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.name;
          opt.textContent = p.name.charAt(0).toUpperCase() + p.name.slice(1);
          if (p.active) opt.selected = true;
          modelSelect.appendChild(opt);
        });
        const saved = localStorage.getItem('mini-agent-model');
        if (saved && providers.some(p => p.name === saved)) {
          modelSelect.value = saved;
        }
      } catch (err) {
        console.error('Failed to load providers:', err);
      }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text && uploadedFiles.length === 0) return;
      if (isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      sendBtn.textContent = '...';

      addMessage('user', text, uploadedFiles.map(f => f.name));
      messageInput.value = '';

      const imagePaths = uploadedFiles.map(f => f.path);

      try {
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            text,
            image_paths: imagePaths.length ? imagePaths : null,
            provider: modelSelect.value
          })
        });
        const data = await res.json();

        if (data.steps && data.steps.length) {
          data.steps.forEach(step => addToolStep(step));
        }

        addMessage('agent', data.reply || '无响应');
      } catch (err) {
        addMessage('agent', `错误: ${err.message}`, null, true);
      }

      uploadedFiles = [];
      fileInput.value = '';
      isLoading = false;
      sendBtn.disabled = false;
      sendBtn.textContent = '发送';
    }

    function addMessage(role, content, fileNames = null, isError = false) {
      const div = document.createElement('div');
      div.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';

      const bubble = document.createElement('div');
      if (role === 'user') {
        bubble.className = 'bg-indigo-600 text-white rounded-2xl px-4 py-2 max-w-xs';
      } else if (isError) {
        bubble.className = 'bg-red-100 text-red-700 rounded-2xl px-4 py-2 max-w-2xl';
      } else {
        bubble.className = 'bg-gray-100 text-gray-800 rounded-2xl px-4 py-2 max-w-2xl';
      }

      const contentDiv = document.createElement('div');
      contentDiv.className = 'whitespace-pre-wrap';
      contentDiv.textContent = content;

      bubble.appendChild(contentDiv);

      if (fileNames && fileNames.length) {
        fileNames.forEach(n => {
          const f = document.createElement('div');
          f.className = 'text-xs opacity-75 mt-1';
          f.textContent = '📎 ' + n;
          bubble.appendChild(f);
        });
      }

      div.appendChild(bubble);
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addToolStep(step) {
      const div = document.createElement('div');
      div.className = 'flex justify-start';

      const inner = document.createElement('div');
      inner.className = 'text-sm text-gray-500 font-mono bg-gray-50 rounded px-3 py-1 max-w-2xl';
      inner.style.cursor = 'pointer';

      const icon = document.createElement('span');
      icon.className = 'text-indigo-500 mr-1';
      icon.textContent = '🔧';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'text-gray-700';
      nameSpan.textContent = step.name + ' ';

      const argsSpan = document.createElement('span');
      argsSpan.className = 'text-gray-400';
      argsSpan.textContent = step.arguments;

      inner.appendChild(icon);
      inner.appendChild(nameSpan);
      inner.appendChild(argsSpan);

      div.appendChild(inner);
      chatArea.appendChild(div);

      if (step.result) {
        inner.title = 'Click to expand result';
        inner.addEventListener('click', () => {
          const existing = div.querySelector('.tool-result');
          if (existing) {
            existing.remove();
          } else {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'tool-result text-xs text-gray-600 bg-gray-100 rounded px-3 py-2 mt-1 whitespace-pre-wrap break-all';
            resultDiv.textContent = step.result;
            div.appendChild(resultDiv);
          }
        });
      }

      chatArea.scrollTop = chatArea.scrollHeight;
    }

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async () => {
      for (const file of fileInput.files) {
        const formData = new FormData();
        formData.append('file', file);
        try {
          const res = await fetch(`${API_BASE}/api/upload`, {method: 'POST', body: formData});
          const data = await res.json();
          uploadedFiles.push({path: data.path, name: file.name});
        } catch (err) {
          console.error('Upload failed:', err);
        }
      }
      fileInput.value = '';
    });

    messageInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    modelSelect.addEventListener('change', () => {
      localStorage.setItem('mini-agent-model', modelSelect.value);
    });

    chatArea.addEventListener('dragover', e => {
      e.preventDefault();
      chatArea.classList.add('bg-gray-50');
    });

    chatArea.addEventListener('dragleave', () => {
      chatArea.classList.remove('bg-gray-50');
    });

    chatArea.addEventListener('drop', async e => {
      e.preventDefault();
      chatArea.classList.remove('bg-gray-50');
      const files = e.dataTransfer.files;
      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        try {
          const res = await fetch(`${API_BASE}/api/upload`, {method: 'POST', body: formData});
          const data = await res.json();
          uploadedFiles.push({path: data.path, name: file.name});
        } catch (err) {
          console.error('Upload failed:', err);
        }
      }
    });

    loadProviders();
  </script>
</body>
</html>
