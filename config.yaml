active_provider: deepseek

providers:
  kimi:
    model: kimi-k2.5
  qwen:
    model: qwen-vl-max
  deepseek:
    model: deepseek-chat

skills:
  dir: ./skills
  enabled: null

workspace:
  dir: ./workspace

agent:
  max_iterations: 15

webui:
  host: 127.0.0.1
  port: 8000

tool_policy:
  default: allow
  block_tools: []
  confirm_tools: []
  bash:
    blocked_patterns:
      - "rm -rf /"
      - "rm -rf /*"
      - "sudo"
      - "shutdown"
      - "reboot"
      - "> /dev/"
      - "mkfs"
      - "dd if="
    confirm_patterns:
      - "rm "
      - "mv "
      - "chmod "
      - "chown "
  write:
    confirm_paths:
      - ".env"
      - "config.yaml"
