# 当前启用的 LLM
active_provider: kimi

# Provider 的 model 覆盖（不填就用默认）
providers:
  kimi:
    model: kimi-k2.5
  qwen:
    model: qwen-vl-max
  deepseek:
    model: deepseek-v4-pro

# Skills 配置
skills:
  dir: ./skills
  enabled: null

# Agent 配置
agent:
  max_iterations: 15

# WebUI 配置
webui:
  host: 127.0.0.1
  port: 8000
