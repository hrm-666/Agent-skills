# 当前启用的 LLM
active_provider: kimi

# Provider 的 model 覆盖
providers:
  kimi:
    model: kimi-k2.5
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  qwen:
    model: qwen-max-latest
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  deepseek:
    model: deepseek-r1
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

# Skills 配置
skills:
  dir: ./skills
  enabled: null  # null = 全部启用

# Agent 配置
agent:
  max_iterations: 15

# WebUI 配置
webui:
  host: 127.0.0.1
  port: 8010
